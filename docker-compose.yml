services:
  postgres:
    image: postgres:16-alpine
    container_name: sana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - sana-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sana"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sana-postgres-data:
